name: CI — Frontend

on:
  pull_request:
    branches: [master]
    paths:
      - 'src/frontend/**'
  push:
    branches: [master]
    paths:
      - 'src/frontend/**'

defaults:
  run:
    working-directory: src/frontend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: hashFiles('src/frontend/package-lock.json') != ''
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint src/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    if: hashFiles('src/frontend/package-lock.json') != ''
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npx vite build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    if: hashFiles('src/frontend/package-lock.json') != ''
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests with coverage
        run: npx vitest run --coverage
      - name: Upload coverage summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-frontend
          path: src/frontend/coverage/coverage-summary.json
          retention-days: 1
          if-no-files-found: error

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    if: hashFiles('src/frontend/package-lock.json') != ''
    steps:
      - name: Download frontend coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-frontend
          path: ./coverage
      - name: Enforce line coverage >= 75%
        # Override file-level default (src/frontend) — script reads downloaded artifact at repo root
        working-directory: .
        run: |
          python3 << 'EOF'
          import json, sys

          with open('./coverage/coverage-summary.json') as f:
              data = json.load(f)

          pct = data['total']['lines']['pct']
          threshold = 75.0

          print(f'Frontend line coverage: {pct}% (required >= {threshold}%)')

          if pct < threshold:
              print(f'FAIL: {pct:.1f}% < {threshold}%')
              sys.exit(1)

          print('PASS: coverage threshold met.')
          EOF
