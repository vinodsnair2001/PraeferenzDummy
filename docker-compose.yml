services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-praeferenz}
      POSTGRES_USER: ${POSTGRES_USER:-praeferenz}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praeferenz}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
